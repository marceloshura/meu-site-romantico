<!DOCTYPE html>
<html>
<head>
    <title>Pra você ❤️</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #ff4e50, #1a1a1a);
            font-family: Arial, sans-serif;
            color: white;
        }

        .container {
            text-align: center;
            background: rgba(0,0,0,0.6);
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
        }

        img {
            width: 300px;
            border-radius: 15px;
            transition: 0.3s;
        }

        img:hover {
            transform: scale(1.05);
        }

        h1 {
            margin-top: 20px;
            font-size: 22px;
        }

        button {
            margin-top: 15px;
            padding: 10px 20px;
            border: none;
            border-radius: 10px;
            background: #ff4e50;
            color: white;
            cursor: pointer;
        }

        button:hover {
            background: #ff2e30;
        }
    </style>
</head>
<body>

<div class="container">

    {% if imagem %}
        <img src="{{ url_for('static', filename=imagem) }}">
    {% else %}
        <p>Imagem não encontrada 😢</p>
    {% endif %}

    <h1>{{ mensagem }}</h1>

    <button onclick="location.reload()">Ver outra ❤️</button>

    <!-- 🎵 Música -->
    <audio id="musica" loop>
        <source src="{{ url_for('static', filename='musica.mp3') }}" type="audio/mpeg">
    </audio>

</div>

<!-- 🎵 Script que toca música no primeiro clique -->
<script>
document.body.addEventListener("click", function () {
    const audio = document.getElementById("musica");
    audio.play();
}, { once: true });
</script>

</body>
</html>
